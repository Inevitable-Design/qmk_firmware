name: Build SK87 firmware

on:
  push:
    branches:
      - master
      - sk87-snake-game
    paths:
      - 'keyboards/womier/sk87/**'
      - 'keyboards/womier/common/**'
      - 'modules/signalrgb'
      - '.github/workflows/build-sk87.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qmk/qmk_cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Compile firmware
        run: |
          export QMK_HOME="$GITHUB_WORKSPACE"
          qmk compile -kb womier/sk87 -km default

      - name: Stage release assets
        id: stage
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SHORT_SHA=$(printf '%.7s' "${GITHUB_SHA}")
          if [ "$BRANCH" = "master" ]; then
            NAME="womier-sk87"
            TITLE="Womier SK87 firmware (latest)"
            IS_LATEST="true"
          else
            NAME="womier-sk87-snake-game"
            TITLE="Womier SK87 firmware, Snake game (latest)"
            IS_LATEST="false"
          fi
          mkdir -p release
          cp .build/womier_sk87_default.hex "release/${NAME}.hex"
          cp keyboards/womier/sk87/signalrgb-plugin/WomierSK87.js release/WomierSK87.js
          cp BUILD.md release/BUILD.md
          cp keyboards/womier/sk87/signalrgb-plugin/README.md release/SignalRGB-plugin-README.md
          # Bundle everything into a single zip for one-click download.
          apk add --no-cache zip 2>/dev/null || apt-get install -y zip 2>/dev/null || true
          (cd release && zip -j "${NAME}-bundle.zip" \
             "${NAME}.hex" WomierSK87.js BUILD.md SignalRGB-plugin-README.md)
          ls -la release/
          {
            echo "branch=${BRANCH}"
            echo "name=${NAME}"
            echo "title=${TITLE}"
            echo "is_latest=${IS_LATEST}"
            echo "short_sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}-firmware
          path: release/
          retention-days: 90

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-${{ steps.stage.outputs.branch }}
          name: ${{ steps.stage.outputs.title }}
          body: |
            Pre-built firmware for the **Womier SK87**, auto-built from the `${{ steps.stage.outputs.branch }}` branch at commit `${{ steps.stage.outputs.short_sha }}`.

            New here? Download **`${{ steps.stage.outputs.name }}-bundle.zip`**, unzip it, and follow the flashing steps in `BUILD.md`. The `.hex` is the firmware you flash; the rest is docs and the SignalRGB plugin.

            **Files**

            | File | What it is |
            |------|------------|
            | `${{ steps.stage.outputs.name }}-bundle.zip` | Start here: one-click download with everything below in a single zip. |
            | `${{ steps.stage.outputs.name }}.hex` | Firmware binary. Flash with [QMK Toolbox](https://qmk.fm/toolbox) or `wb32-dfu-updater_cli`. |
            | `WomierSK87.js` | SignalRGB host-side plugin. Drop in `%USERPROFILE%\Documents\WhirlwindFX\Plugins\` (Windows) or `~/Documents/WhirlwindFX/Plugins/` (mac/Linux). |
            | `BUILD.md` | Compile-from-source and flashing steps for Linux and Windows. |
            | `SignalRGB-plugin-README.md` | Detailed SignalRGB setup walkthrough. |

            See [`BUILD.md`](https://github.com/${{ github.repository }}/blob/${{ steps.stage.outputs.branch }}/BUILD.md) for full instructions. After flashing, tap **Fn + Esc** (`EE_CLR`) so VIA picks up the new keycodes.
          files: |
            release/${{ steps.stage.outputs.name }}-bundle.zip
            release/${{ steps.stage.outputs.name }}.hex
            release/WomierSK87.js
            release/BUILD.md
            release/SignalRGB-plugin-README.md
          make_latest: ${{ steps.stage.outputs.is_latest }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
